{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block titulo %}Floristería{% endblock %}</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'estilo.css' %}">

</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
            <div class="container">
                <a class="navbar-brand" href="{% url 'lista_flores' %}">🌸 Floristería</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link text-white" href="{% url 'lista_flores' %}">Flores</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="{% url 'lista_productos' %}">Productos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="{% url 'lista_categorias' %}">Categorías</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mt-5">
        {% block contenido %}{% endblock %}
    </main>

   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
          
            const inputsBloqueados = document.querySelectorAll('input[name="nombre"], textarea[name="descripcion"]');

            inputsBloqueados.forEach(input => {
                input.addEventListener('keypress', function(e) {
                 
                    if (e.key >= '0' && e.key <= '9') {
                        e.preventDefault(); 
                        
                        
                        let warning = this.parentNode.querySelector('.text-warning-custom');
                        if (!warning) {
                            warning = document.createElement('div');
                            warning.className = 'text-warning-custom text-danger small mt-1 fw-bold';
                            warning.innerText = '⚠️ Solo se permiten letras en este campo';
                            this.parentNode.appendChild(warning);
                        }
                        
                        
                        setTimeout(() => {
                            if (warning) warning.remove();
                        }, 2000);
                    }
                });
            });
        });
    </script>
</body>
</html>
